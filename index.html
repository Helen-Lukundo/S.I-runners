<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>S.I Runners 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #05010f; font-family: 'Trebuchet MS', system-ui, sans-serif; }
  #game { position: fixed; inset: 0; }
  canvas { display: block; }

  /* ---- HUD ---- */
  #hud {
    position: fixed; top: 16px; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 0 18px; pointer-events: none; z-index: 5;
  }
  .pill {
    background: rgba(10,4,30,0.55); border: 1px solid rgba(0,240,255,0.5);
    border-radius: 14px; padding: 8px 14px; color: #d6f7ff;
    text-shadow: 0 0 8px rgba(0,240,255,0.7); letter-spacing: 1px;
    box-shadow: 0 0 18px rgba(0,240,255,0.18);
  }
  .pill .num { color: #fff; font-weight: bold; font-size: 1.25em; }
  #coinPill { border-color: rgba(255,200,40,0.6); box-shadow: 0 0 18px rgba(255,200,40,0.2); }
  #coinPill, #coinPill .num { color: #ffe79a; text-shadow: 0 0 8px rgba(255,190,40,0.8); }

  /* ---- Screens ---- */
  .screen {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; color: #eaf6ff; padding: 24px;
    background: radial-gradient(circle at 50% 35%, rgba(20,4,55,0.55), rgba(3,1,12,0.92));
    backdrop-filter: blur(2px);
  }
  .hidden { display: none !important; }
  .title {
    font-size: clamp(38px, 11vw, 86px); font-weight: 900; letter-spacing: 3px;
    background: linear-gradient(90deg, #00f0ff, #b14bff, #ff3ea5);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 0 18px rgba(120,60,255,0.55)); line-height: 1;
  }
  .subtitle { margin-top: 6px; color: #9fd9ff; letter-spacing: 6px; font-size: clamp(12px,3.5vw,18px); }
  .panel {
    margin-top: 22px; background: rgba(10,4,30,0.5); border: 1px solid rgba(0,240,255,0.35);
    border-radius: 18px; padding: 18px 22px; max-width: 380px; line-height: 1.6;
    box-shadow: 0 0 30px rgba(80,40,200,0.25);
  }
  .panel .key { color: #00f0ff; font-weight: bold; text-shadow: 0 0 8px rgba(0,240,255,0.6); }
  .btn {
    margin-top: 22px; cursor: pointer; border: none; border-radius: 16px;
    padding: 16px 42px; font-size: clamp(18px,5vw,24px); font-weight: 800; letter-spacing: 2px;
    color: #04010f; background: linear-gradient(90deg,#00f0ff,#7b5bff);
    box-shadow: 0 0 26px rgba(0,240,255,0.5); transition: transform .08s ease, box-shadow .2s ease;
  }
  .btn:active { transform: scale(0.96); }
  .btn:hover { box-shadow: 0 0 40px rgba(120,90,255,0.8); }
  .big { font-size: clamp(28px,8vw,54px); font-weight: 900; color: #ff5ea0; text-shadow: 0 0 18px rgba(255,60,150,0.7); }
  .stat { margin-top: 8px; font-size: clamp(16px,4.5vw,22px); color: #d6f7ff; }
  .stat b { color: #fff; }

  #version {
    position: fixed; right: 10px; bottom: 8px; z-index: 6;
    color: rgba(150,200,255,0.65); font-size: 12px; letter-spacing: 1px; pointer-events: none;
  }
  #credit {
    position: fixed; left: 10px; bottom: 8px; z-index: 6;
    color: rgba(150,200,255,0.5); font-size: 12px; letter-spacing: 1px; pointer-events: none;
  }

  /* mobile control hints */
  #touchHint { margin-top: 14px; color: #8fb6d6; font-size: 14px; }
</style>
</head>
<body>
  <div id="game"></div>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div class="pill">SCORE <span class="num" id="scoreVal">0</span></div>
    <div class="pill" id="coinPill">◎ <span class="num" id="coinVal">0</span></div>
  </div>

  <!-- Start screen -->
  <div id="startScreen" class="screen">
    <div class="title">S.I RUNNERS</div>
    <div class="subtitle">3 &middot; D &middot; C Y B E R</div>
    <div class="panel">
      Dodge through the neon city. Switch lanes, jump the barriers, grab the data-coins.<br><br>
      <span class="key">◀ ▶ / A D</span> &nbsp;move &nbsp;&middot;&nbsp; <span class="key">▲ / W / Space</span> &nbsp;jump
      <div id="touchHint">On phone: <b>swipe</b> left / right to move, <b>swipe up</b> to jump.</div>
    </div>
    <button class="btn" id="startBtn">START</button>
  </div>

  <!-- Game over screen -->
  <div id="overScreen" class="screen hidden">
    <div class="big">SYSTEM CRASH</div>
    <div class="stat">Score: <b id="finalScore">0</b></div>
    <div class="stat">Coins: <b id="finalCoins">0</b></div>
    <div class="stat" id="bestLine">Best: <b id="bestScore">0</b></div>
    <button class="btn" id="retryBtn">RUN AGAIN</button>
  </div>

  <div id="version">v2.0</div>
  <div id="credit">Created by Sean MC</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  (function () {
    "use strict";

    // ---------- Config ----------
    var LANES = [-2.4, 0, 2.4];        // x positions of the 3 lanes
    var TRACK_LEN = 200;               // how far ahead the world stretches
    var SEG = 10;                      // spacing between spawn slots
    var BASE_SPEED = 22;               // starting forward speed
    var MAX_SPEED = 60;
    var GRAVITY = 75;
    var JUMP_V = 23;

    // ---------- State ----------
    var scene, camera, renderer, clock;
    var player, playerLegL, playerLegR, playerArmL, playerArmR;
    var roadTiles = [], buildings = [], obstacles = [], coins = [];
    var lane = 1, targetX = 0, vy = 0, grounded = true, runT = 0;
    var speed = BASE_SPEED, distance = 0, coinCount = 0, score = 0;
    var state = "menu"; // menu | playing | over
    var best = 0;

    // ---------- Setup ----------
    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x070314);
      scene.fog = new THREE.Fog(0x0a0524, 35, 120);

      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 400);
      camera.position.set(0, 6.2, 11);
      camera.lookAt(0, 1.8, -14);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.getElementById("game").appendChild(renderer.domElement);

      // Lights
      scene.add(new THREE.AmbientLight(0x4455aa, 0.9));
      var key = new THREE.DirectionalLight(0xff66dd, 0.9);
      key.position.set(-8, 18, 6); scene.add(key);
      var rim = new THREE.DirectionalLight(0x33ffff, 0.8);
      rim.position.set(8, 12, -10); scene.add(rim);

      buildWorld();
      buildPlayer();
      bindControls();
      clock = new THREE.Clock();
      animate();
    }

    // ---------- World ----------
    function buildWorld() {
      // road tiles (recycled)
      var roadMat = new THREE.MeshStandardMaterial({ color: 0x12082b, metalness: 0.6, roughness: 0.4 });
      var glowMat = new THREE.MeshBasicMaterial({ color: 0x00f0ff });
      for (var i = 0; i < TRACK_LEN / SEG; i++) {
        var tile = new THREE.Group();
        var road = new THREE.Mesh(new THREE.BoxGeometry(9, 0.4, SEG), roadMat);
        road.position.y = -0.2; tile.add(road);
        // lane divider neon strips
        [-1.2, 1.2].forEach(function (x) {
          var strip = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.05, SEG * 0.55), glowMat);
          strip.position.set(x, 0.02, 0); tile.add(strip);
        });
        // side edge glow
        [-4.4, 4.4].forEach(function (x) {
          var edge = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.5, SEG),
            new THREE.MeshBasicMaterial({ color: x < 0 ? 0xff2e9a : 0x7b5bff }));
          edge.position.set(x, 0.1, 0); tile.add(edge);
        });
        tile.position.z = -i * SEG;
        scene.add(tile); roadTiles.push(tile);
      }

      // skyline buildings (recycled), both sides
      var winColors = [0x00f0ff, 0xff2e9a, 0xb14bff, 0xffd23e, 0x2effc2];
      for (var s = 0; s < 40; s++) {
        var side = s % 2 === 0 ? -1 : 1;
        var h = 8 + Math.random() * 30;
        var col = winColors[(Math.random() * winColors.length) | 0];
        var b = new THREE.Mesh(
          new THREE.BoxGeometry(3 + Math.random() * 3, h, 3 + Math.random() * 3),
          new THREE.MeshStandardMaterial({
            color: 0x0c0826, emissive: col, emissiveIntensity: 0.35,
            metalness: 0.7, roughness: 0.5
          })
        );
        b.position.set(side * (8 + Math.random() * 16), h / 2 - 0.2, -Math.random() * TRACK_LEN);
        scene.add(b); buildings.push(b);
      }

      // pre-spawn obstacles & coins along the track
      for (var z = -30; z > -TRACK_LEN; z -= SEG) {
        maybeSpawn(z);
      }
    }

    function maybeSpawn(z) {
      var r = Math.random();
      if (r < 0.55) spawnObstacle(z);
      else if (r < 0.92) spawnCoinRow(z);
      // else: empty breather slot
    }

    function spawnObstacle(z) {
      var l = (Math.random() * 3) | 0;
      var tall = Math.random() < 0.5; // tall = must change lane; low = can jump
      var geo = tall ? new THREE.BoxGeometry(1.6, 3.0, 0.7) : new THREE.BoxGeometry(1.8, 1.0, 0.7);
      var ob = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
        color: 0x1a0e3a, emissive: tall ? 0xff2e6a : 0xffae2e,
        emissiveIntensity: 0.7, metalness: 0.5, roughness: 0.4
      }));
      ob.position.set(LANES[l], tall ? 1.5 : 0.5, z);
      ob.userData = { lane: l, low: !tall };
      scene.add(ob); obstacles.push(ob);
    }

    function spawnCoinRow(z) {
      var l = (Math.random() * 3) | 0;
      for (var k = 0; k < 4; k++) {
        var c = new THREE.Mesh(
          new THREE.CylinderGeometry(0.32, 0.32, 0.1, 16),
          new THREE.MeshStandardMaterial({ color: 0xffd23e, emissive: 0xffae00, emissiveIntensity: 0.8, metalness: 0.9, roughness: 0.2 })
        );
        c.rotation.x = Math.PI / 2;
        c.position.set(LANES[l], 1.1, z - k * 2.2);
        c.userData = { lane: l, alive: true };
        scene.add(c); coins.push(c);
      }
    }

    // ---------- Player (cyberpunk robot from primitives) ----------
    function buildPlayer() {
      player = new THREE.Group();

      var bodyMat = new THREE.MeshStandardMaterial({ color: 0x161033, emissive: 0x00d8ff, emissiveIntensity: 0.25, metalness: 0.8, roughness: 0.35 });
      var neonMat = new THREE.MeshStandardMaterial({ color: 0x00f0ff, emissive: 0x00f0ff, emissiveIntensity: 0.9 });
      var pinkMat = new THREE.MeshStandardMaterial({ color: 0xff2e9a, emissive: 0xff2e9a, emissiveIntensity: 0.9 });

      var torso = new THREE.Mesh(new THREE.BoxGeometry(1.1, 1.3, 0.6), bodyMat);
      torso.position.y = 1.7; player.add(torso);

      var chest = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.05), neonMat);
      chest.position.set(0, 1.85, 0.32); player.add(chest);

      var head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), bodyMat);
      head.position.y = 2.7; player.add(head);
      var visor = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.18, 0.05), pinkMat);
      visor.position.set(0, 2.75, 0.36); player.add(visor);

      playerArmL = makeLimb(0.22, 1.0, bodyMat); playerArmL.position.set(-0.72, 1.85, 0);
      playerArmR = makeLimb(0.22, 1.0, bodyMat); playerArmR.position.set(0.72, 1.85, 0);
      player.add(playerArmL); player.add(playerArmR);

      playerLegL = makeLimb(0.28, 1.05, bodyMat); playerLegL.position.set(-0.3, 1.0, 0);
      playerLegR = makeLimb(0.28, 1.05, bodyMat); playerLegR.position.set(0.3, 1.0, 0);
      player.add(playerLegL); player.add(playerLegR);

      player.position.set(0, 0, 1);
      scene.add(player);
    }

    function makeLimb(w, h, mat) {
      var g = new THREE.Group();
      var m = new THREE.Mesh(new THREE.BoxGeometry(w, h, w), mat);
      m.position.y = -h / 2; g.add(m);
      return g;
    }

    // ---------- Controls ----------
    function bindControls() {
      document.addEventListener("keydown", function (e) {
        if (state !== "playing") return;
        if (e.code === "ArrowLeft" || e.code === "KeyA") move(-1);
        else if (e.code === "ArrowRight" || e.code === "KeyD") move(1);
        else if (e.code === "ArrowUp" || e.code === "KeyW" || e.code === "Space") jump();
      });

      var sx = 0, sy = 0, touching = false;
      window.addEventListener("touchstart", function (e) {
        touching = true; sx = e.touches[0].clientX; sy = e.touches[0].clientY;
      }, { passive: true });
      window.addEventListener("touchend", function (e) {
        if (!touching || state !== "playing") { touching = false; return; }
        touching = false;
        var t = e.changedTouches[0];
        var dx = t.clientX - sx, dy = t.clientY - sy;
        if (Math.abs(dx) > Math.abs(dy)) { if (Math.abs(dx) > 24) move(dx > 0 ? 1 : -1); }
        else { if (dy < -24) jump(); }
      }, { passive: true });

      document.getElementById("startBtn").addEventListener("click", startGame);
      document.getElementById("retryBtn").addEventListener("click", startGame);
      window.addEventListener("resize", onResize);
    }

    function move(dir) {
      lane = Math.max(0, Math.min(2, lane + dir));
      targetX = LANES[lane];
    }
    function jump() { if (grounded) { vy = JUMP_V; grounded = false; } }

    // ---------- Game flow ----------
    function startGame() {
      // reset
      lane = 1; targetX = 0; vy = 0; grounded = true;
      speed = BASE_SPEED; distance = 0; coinCount = 0; score = 0;
      player.position.set(0, 0, 1);
      // clear & respawn track contents
      obstacles.forEach(function (o) { scene.remove(o); }); obstacles = [];
      coins.forEach(function (c) { scene.remove(c); }); coins = [];
      for (var z = -30; z > -TRACK_LEN; z -= SEG) maybeSpawn(z);

      state = "playing";
      document.getElementById("startScreen").classList.add("hidden");
      document.getElementById("overScreen").classList.add("hidden");
      document.getElementById("hud").classList.remove("hidden");
    }

    function gameOver() {
      state = "over";
      if (score > best) best = score;
      document.getElementById("finalScore").textContent = score;
      document.getElementById("finalCoins").textContent = coinCount;
      document.getElementById("bestScore").textContent = best;
      document.getElementById("hud").classList.add("hidden");
      document.getElementById("overScreen").classList.remove("hidden");
    }

    // ---------- Loop ----------
    function animate() {
      requestAnimationFrame(animate);
      var dt = Math.min(clock.getDelta(), 0.05);
      if (state === "playing") update(dt);
      renderer.render(scene, camera);
    }

    function update(dt) {
      // speed ramps up slowly
      speed = Math.min(MAX_SPEED, speed + dt * 0.8);
      var move = speed * dt;
      distance += move;

      // lane lerp + run bob
      player.position.x += (targetX - player.position.x) * Math.min(1, dt * 14);
      runT += dt * speed * 0.5;
      // vertical (jump)
      vy -= GRAVITY * dt;
      player.position.y += vy * dt;
      if (player.position.y <= 0) { player.position.y = 0; vy = 0; grounded = true; }

      // leg / arm run animation (freeze when airborne)
      var swing = grounded ? Math.sin(runT) * 0.7 : 0.3;
      if (playerLegL) playerLegL.rotation.x = swing;
      if (playerLegR) playerLegR.rotation.x = -swing;
      if (playerArmL) playerArmL.rotation.x = -swing;
      if (playerArmR) playerArmR.rotation.x = swing;
      player.rotation.y = (targetX - player.position.x) * -0.25; // lean into turns

      // scroll road tiles
      roadTiles.forEach(function (t) {
        t.position.z += move;
        if (t.position.z > SEG) t.position.z -= TRACK_LEN;
      });
      // scroll buildings
      buildings.forEach(function (b) {
        b.position.z += move;
        if (b.position.z > 20) b.position.z -= TRACK_LEN;
      });

      // scroll + recycle obstacles
      obstacles.forEach(function (o) {
        o.position.z += move;
        if (o.position.z > 8) {
          // recycle far ahead
          o.position.z -= TRACK_LEN;
          var l = (Math.random() * 3) | 0;
          o.position.x = LANES[l];
          o.userData.lane = l;
        }
      });

      // scroll + recycle coins, spin them
      coins.forEach(function (c) {
        c.position.z += move;
        c.rotation.z += dt * 6;
        if (c.position.z > 8) { c.position.z -= TRACK_LEN; c.userData.alive = true; c.visible = true; }
      });

      checkCollisions();

      // score = distance + coins*10
      score = Math.floor(distance) + coinCount * 10;
      document.getElementById("scoreVal").textContent = score;
      document.getElementById("coinVal").textContent = coinCount;
    }

    function checkCollisions() {
      var pz = player.position.z;
      // obstacles
      for (var i = 0; i < obstacles.length; i++) {
        var o = obstacles[i];
        if (Math.abs(o.position.z - pz) < 0.9 && o.userData.lane === lane) {
          if (o.userData.low) {
            if (player.position.y < 1.4) return gameOver(); // didn't jump high enough
          } else {
            return gameOver(); // tall wall, must be in another lane
          }
        }
      }
      // coins
      for (var j = 0; j < coins.length; j++) {
        var c = coins[j];
        if (c.userData.alive && c.userData.lane === lane &&
            Math.abs(c.position.z - pz) < 1.1 && player.position.y < 2.2) {
          c.userData.alive = false; c.visible = false; coinCount++;
        }
      }
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    init();
  })();
  </script>
</body>
</html>
